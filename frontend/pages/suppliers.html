<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Suppliers — InvenTrack</title>
<link rel="stylesheet" href="../static/css/main.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main-content">
  <div class="topbar">
    <div><span class="topbar-title">Suppliers</span><span class="topbar-sub">— Vendor management</span></div>
    <div class="topbar-right">
      <div class="search-wrap"><span class="search-icon">🔍</span>
        <input type="text" class="form-control-custom" id="searchInput" placeholder="Search suppliers…" oninput="filterSuppliers()">
      </div>
      <button class="btn-primary-custom" onclick="openAddModal()">+ Add Supplier</button>
    </div>
  </div>
  <div class="page-body">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px" id="suppliersGrid">
      <div class="page-loader"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop-custom" id="supplierModal">
  <div class="modal-box">
    <div class="modal-header-custom">
      <span class="modal-title" id="suppModalTitle">Add Supplier</span>
      <button class="modal-close" onclick="closeModal('supplierModal')">✕</button>
    </div>
    <div class="modal-body-custom">
      <input type="hidden" id="suppEditId">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label-custom">Company Name *</label>
          <input class="form-control-custom" id="sName" placeholder="e.g. TechSource Pvt Ltd">
        </div>
        <div class="form-group">
          <label class="form-label-custom">Contact Person</label>
          <input class="form-control-custom" id="sContact" placeholder="Name">
        </div>
        <div class="form-group">
          <label class="form-label-custom">Phone</label>
          <input class="form-control-custom" id="sPhone" placeholder="9876543210">
        </div>
        <div class="form-group">
          <label class="form-label-custom">Email</label>
          <input class="form-control-custom" id="sEmail" placeholder="supplier@email.com" type="email">
        </div>
        <div class="form-group">
          <label class="form-label-custom">Lead Time (days)</label>
          <input class="form-control-custom" id="sLead" type="number" min="1" placeholder="7">
        </div>
        <div class="form-group">
          <label class="form-label-custom">Payment Terms</label>
          <select class="form-control-custom" id="sPayment">
            <option>Net 10</option><option>Net 15</option><option>Net 30</option>
            <option>Net 45</option><option>Net 60</option><option>Advance</option><option>COD</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label-custom">Address</label>
          <textarea class="form-control-custom" id="sAddress" rows="2" placeholder="Full address"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer-custom">
      <button class="btn-secondary-custom" onclick="closeModal('supplierModal')">Cancel</button>
      <button class="btn-primary-custom" onclick="saveSupplier()">Save Supplier</button>
    </div>
  </div>
</div>

<script src="../static/js/sidebar.js"></script>
<script src="../static/js/app.js"></script>
<script>
Auth.requireAuth();
renderSidebar();

let allSuppliers = [];

async function loadSuppliers() {
  allSuppliers = await get('/suppliers/') || [];
  renderGrid(allSuppliers);
}

function filterSuppliers() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderGrid(q ? allSuppliers.filter(s => s.name.toLowerCase().includes(q) || (s.contact_person||'').toLowerCase().includes(q)) : allSuppliers);
}

function renderGrid(list) {
  const grid = document.getElementById('suppliersGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🏭</div><p>No suppliers yet. Add one!</p></div>';
    return;
  }
  grid.innerHTML = list.map(s => `
    <div class="card" style="padding:0">
      <div style="padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-weight:700;font-size:15px">${s.name}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${s.contact_person || ''}</div>
        </div>
        <span class="badge-status success">Active</span>
      </div>
      <div style="padding:16px 20px;display:grid;gap:10px">
        <div style="display:flex;gap:10px;align-items:center;font-size:13px">
          <span>📞</span><span>${s.phone || '—'}</span>
        </div>
        <div style="display:flex;gap:10px;align-items:center;font-size:13px">
          <span>📧</span><span style="color:var(--primary)">${s.email || '—'}</span>
        </div>
        <div style="display:flex;gap:10px;align-items:center;font-size:13px">
          <span>📍</span><span style="color:var(--text-muted)">${s.address || '—'}</span>
        </div>
        <div style="display:flex;gap:20px;margin-top:4px">
          <div><div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Lead Time</div>
          <div style="font-weight:700;color:var(--primary)">${s.lead_time_days} days</div></div>
          <div><div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Payment</div>
          <div style="font-weight:700">${s.payment_terms || '—'}</div></div>
        </div>
      </div>
      <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px">
        <button class="btn-secondary-custom btn-sm" style="flex:1" onclick="editSupplier(${s.id})">✏️ Edit</button>
        <button class="btn-danger-custom btn-sm" onclick="deleteSupplier(${s.id},'${s.name}')">🗑</button>
      </div>
    </div>`).join('');
}

function openAddModal() {
  document.getElementById('suppModalTitle').textContent = 'Add Supplier';
  document.getElementById('suppEditId').value = '';
  ['sName','sContact','sPhone','sEmail','sAddress'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('sLead').value = 7;
  openModal('supplierModal');
}

function editSupplier(id) {
  const s = allSuppliers.find(x => x.id === id);
  if (!s) return;
  document.getElementById('suppModalTitle').textContent = 'Edit Supplier';
  document.getElementById('suppEditId').value = id;
  document.getElementById('sName').value = s.name;
  document.getElementById('sContact').value = s.contact_person || '';
  document.getElementById('sPhone').value = s.phone || '';
  document.getElementById('sEmail').value = s.email || '';
  document.getElementById('sAddress').value = s.address || '';
  document.getElementById('sLead').value = s.lead_time_days;
  document.getElementById('sPayment').value = s.payment_terms || 'Net 30';
  openModal('supplierModal');
}

async function saveSupplier() {
  const editId = document.getElementById('suppEditId').value;
  const body = {
    name: document.getElementById('sName').value.trim(),
    contact_person: document.getElementById('sContact').value.trim(),
    email: document.getElementById('sEmail').value.trim(),
    phone: document.getElementById('sPhone').value.trim(),
    address: document.getElementById('sAddress').value.trim(),
    payment_terms: document.getElementById('sPayment').value,
    lead_time_days: parseInt(document.getElementById('sLead').value) || 7
  };
  if (!body.name) { toast('Company name is required', 'error'); return; }
  try {
    if (editId) { await put(`/suppliers/${editId}`, body); toast('Supplier updated'); }
    else { await post('/suppliers/', body); toast('Supplier added'); }
    closeModal('supplierModal');
    loadSuppliers();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteSupplier(id, name) {
  if (!confirm(`Remove supplier "${name}"?`)) return;
  try { await del(`/suppliers/${id}`); toast('Supplier removed', 'warning'); loadSuppliers(); }
  catch(e) { toast(e.message, 'error'); }
}

loadSuppliers();
</script>
</body>
</html>
